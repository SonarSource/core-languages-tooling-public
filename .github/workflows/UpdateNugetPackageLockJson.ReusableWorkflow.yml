name: '[renovate] Update NuGet Package Lock JSON'

on:
  workflow_call:
    inputs:
      projects:
        description: 'Newline-separated list of PROJECT|SOLUTION paths to restore'
        required: true
        type: string
      prNumber:
        description: 'PR number to update lock files for (optional, for manual dispatch)'
        required: false
        type: number
        default: 0
      commitMessagePrefix:
        description: 'Optional prefix for the commit message (e.g., "[skip-ci] ")'
        required: false
        type: string
        default: ''

jobs:
  update-lock-files:
    name: Update NuGet Package Lock Files
    runs-on: warp-custom-dotnet-bubble-ci
    permissions:
      id-token: write
      pull-requests: read
    steps:
      - name: Get branch ref
        id: branch-ref
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ref = ${{ inputs.prNumber || 0 }}
              ? (await github.rest.pulls.get({
                  ...context.repo,
                  pull_number: ${{ inputs.prNumber || 0 }}
                })).data.head.ref
              : context.ref;
            core.setOutput('ref', ref);

      # Vault token is used because built-in GITHUB_TOKEN doesn't trigger CI
      - name: Get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-nuget-lock-update token | GITHUB_TOKEN;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USERNAME;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.branch-ref.outputs.ref }}
          token: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}

      - name: Restore NuGet packages with force-evaluate
        env:
          ARTIFACTORY_USER: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}
          PROJECTS: ${{ inputs.projects }}
        run: |
          $failed = @()
          foreach ($project in ($env:PROJECTS -split "`n" | Where-Object { $_ })) {
            Write-Host "Restoring $project"
            dotnet restore $project --force-evaluate
            if ($LASTEXITCODE -ne 0) {
              $failed += $project
            }
          }
          if ($failed.Count -gt 0) {
            Write-Host "##[error]Restore failed for: $($failed -join ', ')"
            exit 1
          }

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          # 'git diff --cached --quiet' exits 1 when there are staged changes. That is the
          # expected "there is something to commit" signal, not a failure. GitHub Actions runs
          # pwsh with $ErrorActionPreference='Stop', which (via $PSNativeCommandUseErrorActionPreference)
          # promotes that exit code 1 to a terminating error and aborts the step before it can commit.
          # Capture the exit code with error promotion disabled, then branch on it.
          $ErrorActionPreference = 'Continue'
          git diff --cached --quiet
          $diffExit = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'

          if ($diffExit -eq 0) {
            Write-Host "No lock file changes to commit."
            exit 0
          }
          elseif ($diffExit -ne 1) {
            Write-Host "##[error]git diff failed with exit code $diffExit"
            exit $diffExit
          }

          git commit -m "${{ inputs.commitMessagePrefix }}Update NuGet package lock files"
          git push
